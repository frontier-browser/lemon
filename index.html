<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRONTIER OS|Limited Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-gradient-light: linear-gradient(135deg,#667eea,#764ba2);
  --bg-gradient-dark: linear-gradient(135deg,#141E30,#243B55);
  --container-light: #fff;
  --container-dark: #1f1f1f;
  --text-light: #000;
  --text-dark: #fff;
  --btn-bg: #667eea;
  --btn-hover: #5561c1;
  --install-bg: #28a745;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Poppins',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:var(--bg-gradient-light);
  overflow:hidden;
  transition:0.4s;
}
body.dark { background:var(--bg-gradient-dark); color:var(--text-dark);}
canvas { position:absolute; top:0; left:0; z-index:0;}
.container {
  position:relative; z-index:2;
  background:var(--container-light);
  color:var(--text-light);
  padding:40px; border-radius:20px;
  width:95%; max-width:500px;
  box-shadow:0 30px 60px rgba(0,0,0,0.3);
  text-align:center;
  animation:fadeIn 0.8s ease;
}
body.dark .container { background:var(--container-dark); color:var(--text-dark);}
input, select {
  width:100%; padding:14px; margin:10px 0;
  border-radius:10px; border:1px solid #ccc; font-size:16px;
}
button {
  width:100%; padding:14px; margin-top:10px;
  border:none; border-radius:10px; font-size:16px;
  background:var(--btn-bg); color:white; cursor:pointer;
  transition:0.3s;
}
button:hover { background:var(--btn-hover); transform:translateY(-2px);}
.install-btn { background:var(--install-bg);}
.spinner {
  margin:15px auto; width:30px; height:30px;
  border:4px solid #f3f3f3; border-top:4px solid var(--btn-bg);
  border-radius:50%; animation:spin 1s linear infinite; display:none;
}
.history { margin-top:15px; font-size:13px; text-align:left; max-height:100px; overflow-y:auto;}
.toggle { margin-top:10px; cursor:pointer; font-size:14px;}
@keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
@keyframes fadeIn { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }
</style>
</head>
<body>
<canvas id="bg" aria-hidden="true"></canvas>
<div class="container">
  <h2>FRONTIER OS🚀</h2>
  <input type="text" id="searchInput" placeholder="Search anything..." aria-label="Search">
  <select id="categorySelect" aria-label="Select Category">
    <option value="auto">🤖 Auto AI Detect</option>
    <option value="music">🎵 Music</option>
    <option value="video">🎬 Video</option>
    <option value="movie">🍿 Movies</option>
    <option value="social">📱 Social</option>
  </select>
  <button id="searchBtn">Search</button>
  <button id="voiceBtn">🎤 Voice Search</button>
  <div class="spinner" id="spinner" role="status" aria-label="Loading"></div>
  <div class="toggle" id="darkToggle" role="button" tabindex="0">Toggle Dark Mode</div>
  <button class="install-btn" id="installBtn" style="display:none;">Install App</button>
  <button id="clearHistory" style="margin-top:5px;background:#dc3545;">Clear History</button>
  <div class="history" id="history" aria-live="polite"></div>
</div>

<script type="module">
/* ================================
   KAIF'S ADVANCED SEARCH ENGINE
   Modular & Modern JS
   ================================ */

const $ = selector => document.querySelector(selector);

// ----- ELEMENTS -----
const searchInput = $("#searchInput");
const categorySelect = $("#categorySelect");
const searchBtn = $("#searchBtn");
const voiceBtn = $("#voiceBtn");
const spinner = $("#spinner");
const historyEl = $("#history");
const darkToggle = $("#darkToggle");
const installBtn = $("#installBtn");
const clearHistoryBtn = $("#clearHistory");

// ----- HISTORY MODULE -----
class HistoryManager {
  max = 5;
  get() { return JSON.parse(localStorage.getItem("history")||"[]"); }
  save(query) {
    let h = this.get();
    h = [query, ...h.filter(q=>q!==query)].slice(0,this.max);
    localStorage.setItem("history", JSON.stringify(h));
    this.render();
  }
  clear() { localStorage.removeItem("history"); this.render(); }
  render() {
    const h = this.get();
    historyEl.innerHTML = h.length
      ? "<b>Recent:</b><br>" + h.map(q=>`<span class="history-item" style="cursor:pointer;">• ${q}</span>`).join("<br>")
      : "";
    document.querySelectorAll(".history-item").forEach(el => {
      el.addEventListener("click", () => {
        searchInput.value = el.textContent.slice(2);
        Search.redirect();
      });
    });
  }
}
const History = new HistoryManager();
History.render();
clearHistoryBtn.addEventListener("click", ()=>History.clear());

// ----- SEARCH MODULE -----
class SearchEngine {
  routes = {
    music: q=>`https://open.spotify.com/search/${encodeURIComponent(q)}`,
    video: q=>`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`,
    movie: q=>`https://himovies.sx/search/${encodeURIComponent(q)}`,
    social: q=>`https://www.instagram.com/explore/tags/${encodeURIComponent(q)}`,
    adult: q=>`https://xhamster.com/search/${encodeURIComponent(q)}`
  };
  
  detectCategory(query) {
    query = query.toLowerCase();
    if(/music|song|album|artist|spotify/.test(query)) return "music";
    if(/video|watch|youtube|clip/.test(query)) return "video";
    if(/movie|film|series|netflix/.test(query)) return "movie";
    if(/social|chat|follow|instagram/.test(query)) return "social";
    if(/naughty|hot|porn|adult/.test(query)) return "adult";
    return null;
  }

  redirect() {
    const query = searchInput.value.trim();
    if(!query) return alert("Enter something!");
    spinner.style.display = "block";
    History.save(query);
    let selected = categorySelect.value;
    let category = selected === "auto" ? this.detectCategory(query) : selected;
    setTimeout(()=>{
      spinner.style.display = "none";
      if(category && this.routes[category]) window.location.href = this.routes[category](query);
      else window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
    }, 800);
  }
}
const Search = new SearchEngine();
searchBtn.addEventListener("click", ()=>Search.redirect());

// Support Enter key to search
searchInput.addEventListener("keypress", (e)=>{ if(e.key==="Enter") Search.redirect(); });

// ----- VOICE SEARCH -----
voiceBtn.addEventListener("click", ()=>{
  if(!('webkitSpeechRecognition' in window)){ alert("Voice not supported"); return; }
  const recognition = new webkitSpeechRecognition();
  recognition.lang = "en-US";
  recognition.start();
  spinner.style.display = "block";
  recognition.onresult = e => { searchInput.value = e.results[0][0].transcript; spinner.style.display="none"; };
  recognition.onerror = ()=>{ spinner.style.display="none"; };
});

// ----- DARK MODE -----
darkToggle.addEventListener("click", ()=>document.body.classList.toggle("dark"));
darkToggle.addEventListener("keypress", (e)=>{ if(e.key==="Enter") document.body.classList.toggle("dark"); });

// ----- PARTICLE BACKGROUND -----
const canvas = $("#bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particleCount = window.innerWidth < 600 ? 30 : 60;
let particles = Array.from({length:particleCount}, () => ({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height,
  r: Math.random()*3+1,
  dx: Math.random()-0.5,
  dy: Math.random()-0.5
}));

function animateParticles() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.6)";
    ctx.fill();
    p.x += p.dx; p.y += p.dy;
    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();
window.addEventListener("resize", ()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });

// ----- PWA INSTALL -----
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display="block";
});
installBtn.addEventListener("click", async ()=>{
  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;
  installBtn.style.display="none";
});
</script>
</body>
</html>
